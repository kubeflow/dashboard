name: PodDefaults Multi-Arch Build Test
on:
  pull_request:
    paths:
      - components/poddefaults-webhooks/**
      - releasing/version/VERSION
    branches:
      - main
      - v*-branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.number }}
  cancel-in-progress: true

env:
  IMG: ghcr.io/kubeflow/dashboard/poddefaults-webhook
  ARCH: linux/amd64,linux/ppc64le,linux/arm64/v8

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build multi-arch Image
      run: |
        cd components/poddefaults-webhooks
        make docker-build-multi-arch
