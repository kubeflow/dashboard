name: CentralDashboard-Angular Frontend Tests
on:
  pull_request:
    paths:
      - components/centraldashboard-angular/**
      - releasing/version/VERSION
    branches:
      - main
      - v*-branch

jobs:
  frontend-format-lint-check:
    name: Check code format and lint
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 16

      - name: Check frontend code formatting
        run: |
          cd components/centraldashboard-angular/frontend/
          npm i
          npm run format:check

      - name: Check frontend code linting
        run: |
          cd components/centraldashboard-angular/frontend
          npm i
          npm run lint-check

  run-frontend-unittests:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 16

      - name: Install dependencies
        run: |
          BASE="${{ github.workspace }}/components/centraldashboard-angular"
          cd "$BASE/frontend"
          npm i
          cd "$BASE"
          make build-common-lib
          cd "$BASE/frontend"
          npm link kubeflow

      - name: Run unit tests
        run: |
          cd components/centraldashboard-angular/frontend/
          npm run test:prod

  run-ui-tests:
    name: UI tests in chrome and firefox
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node version to 16
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 16

      - name: Install KinD
        run: ./testing/gh-actions/install_kind.sh

      - name: Create KinD Cluster
        run: kind create cluster --config testing/gh-actions/kind-1-33.yaml

      - name: Install kustomize
        run: ./testing/gh-actions/install_kustomize.sh

      - name: Install Istio
        run: ./testing/gh-actions/install_istio.sh

      - name: Create Kubeflow Namespace
        run: |
          kubectl create namespace kubeflow

      - name: Deploy Profile Controller with KFAM
        run: ./testing/shared/install_profile_controller.sh

      - name: Apply Notebooks Controller
        run: |
          kubectl apply -k "https://github.com/kubeflow/kubeflow/components/notebook-controller/config/overlays/kubeflow?ref=v1.10.0"
          kubectl wait pods -n kubeflow -l app=notebook-controller --for=condition=Ready --timeout=300s

      - name: Apply Jupyter Web App manifests
        run: |
          kubectl apply -k "https://github.com/kubeflow/kubeflow/components/crud-web-apps/jupyter/manifests/overlays/istio?ref=v1.10.0"
          kubectl wait pods -n kubeflow -l app=jupyter-web-app --for=condition=Ready --timeout=300s
          kubectl port-forward -n kubeflow svc/jupyter-web-app-service 8085:80 &

      - name: Apply Volumes Web App manifests
        run: |
          kubectl apply -k "https://github.com/kubeflow/kubeflow/components/crud-web-apps/volumes/manifests/overlays/istio?ref=v1.10.0"
          kubectl wait pods -n kubeflow -l app=volumes-web-app --for=condition=Ready --timeout=300s
          kubectl port-forward -n kubeflow svc/volumes-web-app-service 8087:80 &

      - name: Apply necessary CRs
        timeout-minutes: 15
        run: |
          kubectl apply -k "https://github.com/kubeflow/manifests/common/kubeflow-roles/base?ref=v1.11.0"
          kubectl apply -f components/profile-controller/integration/resources/user-profile.yaml
          while ! kubectl get ns kubeflow-user; do sleep 1; done
          kubectl apply -f components/centraldashboard-angular/integration/resources/test-notebook.yaml
          kubectl wait notebooks -n kubeflow-user -l app=test-notebook --for=condition=Ready --timeout=300s

      - name: Test proxied apps
        run: |
          curl -H "kubeflow-userid: user" localhost:8085
          curl -H "kubeflow-userid: user" localhost:8087

      - name: Install dependencies
        run: |
          BASE="${{ github.workspace }}/components/centraldashboard-angular"
          cd "$BASE/frontend"
          npm i
          cd "$BASE"
          make build-common-lib
          cd "$BASE/frontend"
          npm link kubeflow

      - name: Serve UI & run Cypress tests in Chrome and Electron
        run: |
          cd components/centraldashboard-angular/frontend
          npm run serve & npx wait-on http://localhost:4200
          npm run ui-test-ci-all
