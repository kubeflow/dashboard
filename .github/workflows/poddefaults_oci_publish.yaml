name: Build & Publish PodDefaults OCI image
on:
  push:
    branches:
      - main
      - v*-branch
    paths:
      - components/poddefaults-webhooks/**
      - releasing/version/VERSION

env:
  IMG: ghcr.io/kubeflow/dashboard/poddefaults-webhook
  ARCH: linux/amd64,linux/ppc64le,linux/arm64/v8

permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Build & Push OCI image to GHCR
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
      id: filter
      with:
        base: ${{ github.ref }}
        filters: |
          version:
            - 'releasing/version/VERSION'

    - name: Login to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build and push multi-architecture OCI image (commit tag)
      run: |
        cd components/poddefaults-webhooks
        make docker-build-multi-arch
        make docker-build-push-multi-arch

    - name: Build and push multi-architecture OCI image (latest tag)
      if: github.ref == 'refs/heads/main'
      run: |
        export TAG=latest
        cd components/poddefaults-webhooks
        make docker-build-push-multi-arch

    - name: Build and push multi-architecture OCI image (version tag)
      id: version
      if: steps.filter.outputs.version == 'true'
      run: |
        export TAG=$(cat releasing/version/VERSION)
        cd components/poddefaults-webhooks
        make docker-build-push-multi-arch
