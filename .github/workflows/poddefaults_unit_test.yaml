name: PodDefaults Unit Tests
on:
  pull_request:
    paths:
      - components/poddefaults-webhooks/**
      - releasing/version/VERSION
    branches:
      - main
      - v*-branch
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version-file: components/poddefaults-webhooks/go.mod
        check-latest: true
        cache-dependency-path: components/poddefaults-webhooks/go.sum

    - name: Build
      working-directory: components/poddefaults-webhooks
      run: make build

    - name: Run unit tests
      working-directory: components/poddefaults-webhooks
      run: make test

    - name: Check if there are uncommitted file changes
      working-directory: components/poddefaults-webhooks
      run: |
        clean=$(git status --porcelain)
        if [[ -z "$clean" ]]; then
            echo "Empty git status --porcelain: $clean"
        else
            echo "Uncommitted file changes detected: $clean"
            git diff
            exit 1
        fi
