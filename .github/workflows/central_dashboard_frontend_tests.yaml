name: CentralDashboard Frontend Tests
on:
  pull_request:
    paths:
      - components/centraldashboard/**
      - releasing/version/VERSION
    branches:
      - main
      - v*-branch

jobs:
  frontend-tests:
    runs-on: ubuntu-22.04
    name: Unit tests
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node version to 16.20.2
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 16.20.2

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        with:
          chrome-version: stable

      - name: Run frontend tests
        run: |
          cd components/centraldashboard
          npm install
          CHROMIUM_BIN=$(which chrome) npm run test
