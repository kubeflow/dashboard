apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard
  labels: {}
spec:
  podSelector:
    matchLabels:
      app: kubeflow-dashboard
      app.kubernetes.io/component: dashboard
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - istio-system
        - podSelector: {}
  policyTypes:
    - Ingress
